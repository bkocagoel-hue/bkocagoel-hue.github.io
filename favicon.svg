<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bk-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddb87d"/>
      <stop offset="100%" stop-color="#c9a065"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#080c18"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#c9a065" stroke-opacity="0.35" stroke-width="1">
    <animate attributeName="stroke-opacity" values="0.35;0.85;0.35" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <text x="32" y="43" font-family="Georgia, 'Playfair Display', serif" font-size="29" font-weight="700"
        text-anchor="middle" fill="url(#bk-gold)" letter-spacing="-1">
    BK
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.2s" repeatCount="indefinite"/>
  </text>

  <circle cx="32" cy="50.5" r="1.6" fill="#c9a065">
    <animate attributeName="r" values="1.2;2;1.2" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
